# 🚀 李伯伯電商系統 - GitHub Pages 自動化部署流程
name: Deploy to GitHub Pages

on:
  # 當代碼推送到 main 分支時觸發
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出原始碼
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境
      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # 3. 安裝相依套件
      - name: Install dependencies 📦
        run: npm install

      # 4. 執行編譯 (產出 dist 資料夾)
      - name: Build 🏗️
        run: npm run build

      # 5. 💡 SPA 關鍵補丁：複製 index.html 為 404.html
      # 這是為了解決 GitHub Pages 重新整理時找不到路徑的問題
      - name: Fix SPA 404 Error 🛠️
        run: cp dist/index.html dist/404.html

      # 6. 自動部署至 gh-pages 分支
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # 要發布的資料夾
          branch: gh-pages # 目標分支